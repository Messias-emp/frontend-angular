<div *ngIf="product as p">

  <h2>{{ p.name }}</h2>

  <img
    *ngIf="p.imageUrl"
    [src]="p.imageUrl"
    [alt]="p.name"
    width="300">

  <p>{{ p.description }}</p>

  <h3>Detalhes</h3>

  <p>{{ p.details }}</p>

  <strong>
    {{ p.price | currency:'BRL':'symbol':'1.2-2' }}
  </strong>

  <br><br>

  <button (click)="addToCart()">
    Adicionar ao carrinho
  </button>

</div>
