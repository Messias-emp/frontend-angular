<div *ngIf="product as p">

  <img
    *ngIf="p.imageUrl"
    [src]="p.imageUrl"
    [alt]="p.name"
    width="300">

  <h2>{{ p.name }}</h2>

  <p>{{ p.description }}</p>

  <p>{{ p.details }}</p>

  <strong>
    {{ p.price | currency:'BRL' }}
  </strong>



  <button (click)="addToCart()">
    Adicionar ao carrinho
  </button>

</div>
