<h2>Login</h2>

<form (ngSubmit)="onSubmit()">

  <div>
    <label>Email</label><br />
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
    />
  </div>

  <div>
    <label>Senha</label><br />
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />
  </div>

  <button type="submit" [disabled]="loading">
    {{ loading ? 'Entrando...' : 'Login' }}
  </button>

  <p *ngIf="error" style="color:red">
    {{ error }}
  </p>
</form>
  <p>
  Não possui conta?
  <a routerLink="/register">Criar conta</a>
 
</p>
