<!-- HERO / BANNER -->
<app-home-banner></app-home-banner>

<!-- SEÇÃO DE PRODUTOS -->
<section class="home-products">

  <div class="section-header">
    <h2>Produtos em Destaque</h2>
    <p>Selecionados para você</p>
  </div>

  <div class="products-grid">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (buy)="addToCart($event)">
    </app-product-card>
  </div>

</section>
