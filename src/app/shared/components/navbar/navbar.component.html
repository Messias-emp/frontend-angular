<mat-toolbar class="navbar">

    <a routerLink="/" class="logo">
        TechStore
    </a>

    <span class="spacer"></span>

    <nav class="menu">

        <a mat-button routerLink="/">
            Home
        </a>

        <a mat-button routerLink="/meus-pedidos">
            Pedidos
        </a>

    </nav>

    <button
        mat-icon-button
        routerLink="/cart"
        [matBadge]="cartCount$ | async"
        matBadgeColor="warn">

        <mat-icon>
            shopping_cart
        </mat-icon>

    </button>

    <button
        mat-button
        [matMenuTriggerFor]="userMenu">

        <mat-icon>
            account_circle
        </mat-icon>

        {{ userName$ | async }}

    </button>

</mat-toolbar>

<mat-menu #userMenu="matMenu">

    <button mat-menu-item routerLink="/profile">

        <mat-icon>person</mat-icon>

        Perfil

    </button>

    <button
        *ngIf="isAdmin()"
        mat-menu-item
        routerLink="/admin/products">

        <mat-icon>admin_panel_settings</mat-icon>

        Administração

    </button>

    <button
        mat-menu-item
        (click)="logout()">

        <mat-icon>logout</mat-icon>

        Sair

    </button>

</mat-menu>
