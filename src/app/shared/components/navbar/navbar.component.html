<nav class="bg-white shadow-md px-8 py-4">

  <div class="max-w-7xl mx-auto flex items-center justify-between">

    <!-- Logo -->
    <a
      routerLink="/"
      class="text-2xl font-bold text-green-600 hover:text-green-700">
      TechStore
    </a>

    <!-- Menu -->
    <div class="flex items-center gap-8">

      <a
        routerLink="/"
        class="text-gray-700 hover:text-green-600 font-medium">
        Home
      </a>

      <a
        routerLink="/cart"
        class="relative text-gray-700 hover:text-green-600 font-medium">

        🛒 Carrinho

        <span
          *ngIf="cartCount$ | async as cartCount"
          class="absolute -top-2 -right-4 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">

          {{ cartCount }}

        </span>

      </a>

      <a
        routerLink="/meus-pedidos"
        class="text-gray-700 hover:text-green-600 font-medium">

        Meus Pedidos

      </a>

      <!-- Usuário -->
      <ng-container *ngIf="isLoggedIn$ | async; else loggedOut">

        <span class="text-sm text-gray-600">
          Olá,
          <strong>{{ userName$ | async }}</strong>
        </span>

        <a
          *ngIf="isAdmin()"
          routerLink="/admin/products"
          class="text-blue-600 hover:text-blue-700 font-medium">

          Admin

        </a>

        <button
          (click)="logout()"
          class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">

          Sair

        </button>

      </ng-container>

      <ng-template #loggedOut>

        <a
          routerLink="/login"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">

          Entrar

        </a>

      </ng-template>

    </div>

  </div>

</nav>
