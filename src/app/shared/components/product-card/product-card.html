<article class="product-card">

  <div class="product-image">
    <img [src]="product.imageUrl" [alt]="product.name">
  </div>

  <div class="product-info">

    <h3>{{ product.name }}</h3>

    <p class="description">
      {{ product.description }}
    </p>

    <p class="price">
      {{ product.price | currency:'BRL' }}
    </p>

    <button (click)="comprar()">
      🛒 Comprar
    </button>

  </div>

</article>
